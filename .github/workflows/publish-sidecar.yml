name: publish-sidecar

on:
  push:
    tags:
      - "sidecar-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: voltmem-sidecar
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == refs/tags/sidecar-v* ]]; then
            VERSION="${GITHUB_REF_NAME#sidecar-v}"
            echo "tags=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:${VERSION},${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tags=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
